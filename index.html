<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Gestão de Faturamento e Repasses · DignusMED</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#070F1F;--ink2:#0A1426;--surface:#0E1B30;--surface2:#13243C;--line:#23405E;
  --line2:#305377;--text:#F0F5FB;--body:#CAD9E9;--muted:#A8BCD1;--faint:#88A1B9;
  --gold:#D9B452;--goldsoft:#EAC65F;--azure:#2E80EB;--azuresoft:#5AA0F2;
  --clinica:#EFC84F;  /* 🟡 Clínica */    --fat:#3FB6E8;     /* 🔵 Faturista */
  --taxa:#EE8033;     /* 🟠 Taxas */       --imposto:#E2564B; /* 🔴 Impostos */
  --prof:#34BD7A;     /* 🟢 Profissional */--steel:#6BA0CC;   /* 🔵 info/faturado */
  --teal:#42B3A5;     /* 🟦 em decisão */
  --r:14px;--r2:18px
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{font-family:"IBM Plex Sans",system-ui,sans-serif;color:var(--text);background:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased;font-size:15px;
  background-image:
    radial-gradient(1100px 520px at 2% -12%,rgba(46,128,235,.16),transparent 60%),
    radial-gradient(820px 520px at 104% -6%,rgba(46,128,235,.10),transparent 58%),
    radial-gradient(680px 520px at 50% 124%,rgba(217,180,82,.05),transparent 60%),
    linear-gradient(rgba(46,128,235,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(46,128,235,.03) 1px,transparent 1px);
  background-size:auto,auto,auto,46px 46px,46px 46px;background-attachment:fixed;min-height:100vh}
.wrap{max-width:1640px;margin:0 auto;padding:24px clamp(16px,3vw,40px) calc(40px + env(safe-area-inset-bottom))}
.hide{display:none!important}

/* ===== LOGIN ===== */
.gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(900px 600px at 50% -8%,rgba(46,128,235,.16),transparent 60%),radial-gradient(700px 460px at 50% 118%,rgba(217,180,82,.06),transparent 60%)}
.gatecard{position:relative;overflow:hidden;width:100%;max-width:460px;background:linear-gradient(180deg,var(--surface),var(--ink2));border:1px solid var(--line2);border-radius:22px;padding:38px 34px 32px;box-shadow:0 40px 100px -36px rgba(0,0,0,.8),0 0 0 1px rgba(46,128,235,.05)}
.gatecard::before{content:"";position:absolute;left:0;right:0;top:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--azure) 55%,transparent)}
.gate .glogo{width:74px;height:74px;border-radius:18px;background:#0b1422;display:grid;place-items:center;margin-bottom:22px;overflow:hidden;border:1px solid var(--line2);box-shadow:0 0 0 4px rgba(46,128,235,.06)}
.gate .glogo img{width:100%;height:100%;object-fit:cover}
.gate .geyebrow{font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--gold);font-weight:700}
.gate h1{font-family:"Fraunces",serif;font-weight:600;font-size:25px;margin:6px 0 7px;letter-spacing:-.01em;line-height:1.1}
.gate .gsub{color:var(--muted);font-size:14.5px;margin:0 0 26px}
.gate label{display:block;font-size:12.5px;color:var(--muted);font-weight:500;margin:0 0 7px}
.gate .gf{margin-bottom:17px}
.gate input{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--line2);border-radius:11px;padding:13px 14px;color:var(--text);font:inherit;font-size:15px;outline:none;transition:.18s}
.gate input:hover{border-color:var(--steel)}
.gate input:focus{border-color:var(--gold);background:rgba(217,180,82,.06);box-shadow:0 0 0 3px rgba(217,180,82,.16)}
.gate .gbtn{width:100%;margin-top:8px;padding:14px;border:none;border-radius:11px;background:linear-gradient(180deg,var(--goldsoft),var(--gold));color:#0A0F16;font:inherit;font-weight:700;font-size:15px;cursor:pointer;transition:.18s}
.gate .gbtn:hover{filter:brightness(1.06)}
.gate .gfoot{margin-top:26px;border-top:1px solid var(--line);padding-top:18px;display:flex;align-items:center;gap:12px;justify-content:center}
.gate .gfoot img{height:30px;opacity:.92}
.gate .gerr{color:var(--imposto);font-size:12.5px;margin-top:-4px;margin-bottom:12px;min-height:16px}

/* ===== HEADER (clínica protagonista · sistema assinatura) ===== */
header{position:relative;display:flex;flex-direction:column;margin-bottom:24px;border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,rgba(20,32,49,.6),rgba(9,15,25,.55));overflow:hidden}
header::before{content:"";position:absolute;left:0;right:0;top:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--azure) 52%,transparent);z-index:3}
header::after{content:"";position:absolute;right:-90px;top:-60px;width:320px;height:320px;background:radial-gradient(circle,rgba(46,128,235,.12),transparent 70%);pointer-events:none}
.brand{width:100%;min-width:0;position:relative;z-index:1}
.oprow{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;padding:11px 22px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.014)}
.sysid{display:flex;align-items:center;gap:12px;min-width:0}
.sysmeta{display:flex;flex-direction:column;line-height:1.3;min-width:0}
.sysname{font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--goldsoft);font-family:"IBM Plex Mono",monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.systag{font-size:11.5px;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.opright{display:flex;align-items:center;gap:13px;flex:0 0 auto}
.opdiv{width:1px;height:22px;background:var(--line2)}
.opuser{display:flex;align-items:center;gap:8px;min-width:0}
.opav{width:26px;height:26px;border-radius:7px;background:linear-gradient(150deg,var(--goldsoft),var(--gold));color:#0A0F16;display:grid;place-items:center;font-weight:700;font-family:"Fraunces",serif;font-size:12px;flex:0 0 auto}
.opun{font-size:12.5px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px}
.brandrow{display:flex;justify-content:space-between;align-items:center;gap:22px;flex-wrap:wrap;padding:22px}
.brandid{display:flex;align-items:center;gap:20px;min-width:0}
.clogo{width:74px;height:74px;border-radius:16px;flex:0 0 auto;background:#fff;display:grid;place-items:center;overflow:hidden;border:1px solid var(--line2);box-shadow:0 0 0 4px rgba(255,255,255,.02),0 12px 30px -12px rgba(0,0,0,.6)}
.clogo.empty{background:linear-gradient(150deg,#16243a,#0c1320)}
.clogo img{width:100%;height:100%;object-fit:contain}
.cname{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.brandmark{border-radius:10px;flex:0 0 auto;display:grid;place-items:center;overflow:hidden;border:1px solid var(--line2);background:linear-gradient(160deg,#0c1322,#0a1018);box-shadow:0 0 0 3px rgba(46,128,235,.05),0 10px 24px -12px rgba(0,0,0,.6)}
.brandmark img{width:100%;height:100%;object-fit:cover}
.hgroup{min-width:0}
.kicker{display:inline-flex;align-items:center;gap:9px;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--goldsoft);font-weight:700;padding:6px 14px;border:1px solid rgba(217,180,82,.30);border-radius:999px;background:linear-gradient(180deg,rgba(217,180,82,.10),rgba(217,180,82,.03))}
.kicker .kdot{width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold);flex:0 0 auto}
h1{font-family:"Fraunces",serif;font-weight:600;font-size:clamp(23px,3.1vw,29px);letter-spacing:-.014em;margin:0;line-height:1.05;color:var(--text)}
.sub{margin:0;color:var(--muted);font-size:14.5px;line-height:1.5;max-width:none}
.metarow{font-size:11.5px;color:var(--faint);margin-top:12px;font-family:"IBM Plex Mono",monospace;letter-spacing:.03em}
.headright{display:none}
.userrow{display:flex;align-items:center;gap:10px}
.statchip{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:600;padding:7px 12px;border-radius:999px;border:1px solid var(--line2);color:var(--muted);background:rgba(255,255,255,.02)}
.statchip i{width:8px;height:8px;border-radius:50%}
.statchip.on{color:var(--prof);border-color:rgba(52,189,122,.4)}.statchip.on i{background:var(--prof);box-shadow:0 0 9px var(--prof)}
.statchip.off{color:var(--faint)}.statchip.off i{background:var(--faint)}
.session{display:flex;align-items:center;gap:11px;padding:7px 8px 7px 13px;border:1px solid var(--line2);border-radius:14px;background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.012))}
.session .su{display:flex;flex-direction:column;align-items:flex-end;line-height:1.3;text-align:right}
.session .su b{font-weight:600;color:var(--text);font-size:13px}
.rolebadge{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 8px;border-radius:6px;margin-top:3px}
.rolebadge.adm{color:#1A1303;background:linear-gradient(180deg,var(--goldsoft),var(--gold))}
.rolebadge.op{color:var(--azuresoft);background:rgba(46,128,235,.16);border:1px solid rgba(46,128,235,.34)}
.session .av{width:42px;height:42px;border-radius:12px;background:linear-gradient(150deg,var(--goldsoft),var(--gold));color:#0A0F16;display:grid;place-items:center;font-weight:700;font-family:"Fraunces",serif;font-size:15px;flex:0 0 auto;box-shadow:0 0 0 3px rgba(217,180,82,.14)}
.hbtns{display:flex;gap:9px;flex-wrap:wrap;justify-content:flex-end}
.btn{font:inherit;font-size:13.5px;font-weight:600;padding:9px 14px;border-radius:10px;border:1px solid var(--line2);background:rgba(255,255,255,.03);color:var(--text);cursor:pointer;transition:.16s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--azure);background:rgba(46,128,235,.12)}
.btn.gold{background:linear-gradient(180deg,var(--goldsoft),var(--gold));color:#0A0F16;border:none}
.btn.gold:hover{filter:brightness(1.06)}
.btn.sm{padding:7px 12px;font-size:12.5px;font-weight:600}
.btn.danger{color:var(--imposto);border-color:rgba(226,86,75,.4)}
.btn.danger:hover{background:rgba(226,86,75,.12);border-color:var(--imposto)}

/* ===== NAV ===== */
nav{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:6px;margin-bottom:22px;scrollbar-width:none;background:linear-gradient(180deg,rgba(255,255,255,.022),rgba(255,255,255,.005));border:1px solid var(--line);border-radius:14px}
nav::-webkit-scrollbar{display:none}
nav button{font:inherit;font-size:13.5px;font-weight:600;white-space:nowrap;padding:10px 16px;border-radius:9px;border:1px solid transparent;background:transparent;color:var(--muted);cursor:pointer;transition:.16s;display:inline-flex;align-items:center;gap:8px}
nav button:hover{color:var(--text);background:rgba(46,128,235,.10)}
nav button.on{background:linear-gradient(180deg,rgba(217,180,82,.20),rgba(217,180,82,.07));color:#fff;border-color:rgba(217,180,82,.45);box-shadow:0 2px 12px -5px rgba(217,180,82,.5)}
nav button .num{font-family:"IBM Plex Mono",monospace;font-size:12px;opacity:.75;font-weight:600}

/* ===== CARDS ===== */
.card{background:linear-gradient(180deg,var(--surface),var(--ink2));border:1px solid var(--line);border-radius:var(--r2);padding:24px 26px}
.card+.card{margin-top:0}
#view{display:flex;flex-direction:column;gap:18px}
.card h2{font-family:"Fraunces",serif;font-weight:600;font-size:19px;margin:0 0 5px;letter-spacing:-.006em;display:flex;align-items:center;gap:10px}
.card .hint{font-size:14px;color:var(--muted);margin:0 0 18px}
.rowbar{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap}
.dot{width:10px;height:10px;border-radius:3px;flex:0 0 auto}
.sectlabel{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);font-weight:600}

/* ===== KPIs ===== */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:0}
.kpi{position:relative;overflow:hidden;background:linear-gradient(180deg,var(--surface),var(--ink2));border:1px solid var(--line);border-radius:var(--r);padding:18px 18px 17px}
.kpi::before{content:"";position:absolute;left:0;top:0;right:0;height:2px;background:linear-gradient(90deg,var(--c,var(--steel)),transparent 82%)}
.kpi::after{content:"";position:absolute;left:0;right:0;bottom:0;height:48px;background:linear-gradient(0deg,var(--c,var(--steel)),transparent);opacity:.12;pointer-events:none}
.kpi .l{display:flex;align-items:center;gap:8px;font-size:10.5px;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;font-weight:700}
.kpi .l::before{content:"";width:7px;height:7px;border-radius:2px;background:var(--c,var(--steel));box-shadow:0 0 7px var(--c,var(--steel))}
.kpi .v{font-family:"IBM Plex Mono",monospace;font-weight:600;font-size:23px;margin-top:11px;letter-spacing:-.01em;color:var(--text)}
.kpi .s{font-size:11.5px;color:var(--faint);margin-top:5px;font-family:"IBM Plex Mono",monospace;letter-spacing:.02em}

.grid2{display:grid;grid-template-columns:1.2fr 1fr;gap:20px;align-items:stretch}
.grid2b{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:stretch}

/* ===== funnel/bars ===== */
.funnel{display:flex;flex-direction:column;gap:15px}
.frow .t{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
.frow .n{font-size:14px;display:flex;align-items:center;gap:9px;color:var(--body)}
.frow .a{font-family:"IBM Plex Mono",monospace;font-size:13.5px;color:var(--text)}.frow .a span{color:var(--faint);font-size:12px;margin-left:7px}
.trk{height:12px;border-radius:7px;background:rgba(255,255,255,.05);overflow:hidden}
.fil{height:100%;border-radius:7px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.bars{display:flex;flex-direction:column;gap:14px}
.bar .t{display:flex;justify-content:space-between;font-size:14px;margin-bottom:6px;color:var(--body)}.bar .t .a{font-family:"IBM Plex Mono",monospace;color:var(--text)}
.bar .trk .fil{background:linear-gradient(90deg,var(--steel),#9cc3e2)}

/* ===== pie + legend ===== */
.piewrap{display:flex;align-items:center;gap:28px;flex-wrap:wrap}
.piewrap svg{flex:0 0 184px;filter:drop-shadow(0 8px 20px rgba(0,0,0,.35))}
.leg{flex:1;min-width:230px;display:flex;flex-direction:column;gap:10px}
.leg .li{display:flex;justify-content:space-between;font-size:14px;align-items:center;padding:9px 13px;border-radius:10px;background:rgba(255,255,255,.025);border:1px solid var(--line);color:var(--body)}
.leg .li .lf{display:flex;align-items:center;gap:10px}.leg .li i{width:12px;height:12px;border-radius:3px;flex:0 0 auto}
.leg .li .rt{font-family:"IBM Plex Mono",monospace;text-align:right;color:var(--text)}.leg .li .rt small{display:block;color:var(--faint);font-size:11.5px}

/* ===== stack + composição ===== */
.stack{height:34px;border-radius:10px;overflow:hidden;display:flex;border:1px solid var(--line2);margin:8px 0 18px}
.stack .seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#0A0F16;overflow:hidden;white-space:nowrap;transition:width .6s}
.compbox{display:flex;flex-direction:column;gap:1px;border-radius:13px;overflow:hidden;border:1px solid var(--line)}
.comp{display:flex;justify-content:space-between;align-items:center;padding:15px 18px;background:var(--surface);gap:14px}
.comp .cl{display:flex;align-items:center;gap:11px;font-size:14.5px;color:var(--body)}
.comp .cl i{width:12px;height:12px;border-radius:3px;flex:0 0 auto}
.comp .cr{font-family:"IBM Plex Mono",monospace;text-align:right;white-space:nowrap;color:var(--text)}
.comp .cr .pc{color:var(--faint);font-size:12px;margin-left:10px}
.comp.bruto{background:rgba(107,160,204,.12)}.comp.bruto .cr{font-size:17px;font-weight:600}
.comp.base{background:rgba(255,255,255,.04)}.comp.base .cr{font-weight:600}
.comp.clin{background:rgba(239,200,79,.12)}.comp.clin .cr{font-size:16px;font-weight:600;color:var(--clinica)}.comp.clin .cl{color:var(--text)}
.comp.liq{background:rgba(52,189,122,.14)}.comp.liq .cr{font-size:16px;font-weight:600;color:var(--prof)}.comp.liq .cl{color:var(--text)}
.comp.sub{background:rgba(255,255,255,.022)}

/* ===== table ===== */
.tbl{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:13px;border:1px solid var(--line)}
table{width:100%;border-collapse:collapse;font-size:13.5px}
thead tr{background:rgba(255,255,255,.025)}
th{font-size:10.5px;letter-spacing:.03em;text-transform:uppercase;color:var(--muted);text-align:right;padding:13px 11px;border-bottom:1px solid var(--line2);font-weight:600;white-space:nowrap}
th.l,td.l{text-align:left}
th.c,td.c{text-align:center}
td{padding:12px 11px;border-bottom:1px solid rgba(255,255,255,.05);font-variant-numeric:tabular-nums;white-space:nowrap;color:var(--body);text-align:right}
tbody tr:last-child td{border-bottom:none}
td.mono{font-family:"IBM Plex Mono",monospace;color:var(--text)}
tbody tr:hover td{background:rgba(63,182,232,.14)}
tr.tot td{border-top:2px solid var(--line2);background:rgba(217,180,82,.07);font-weight:600;color:var(--text)}
tr.lote td{background:rgba(107,160,204,.07);font-weight:600;color:var(--steel);border-top:1px solid var(--line2)}
.c-clin{color:var(--clinica)!important}.c-fat{color:var(--fat)!important}.c-tax{color:var(--taxa)!important}.c-imp{color:var(--imposto)!important}.c-prof{color:var(--prof)!important}
/* chips A/B — cores distintas, ambas visíveis */
.mchip{font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:7px;letter-spacing:.02em;display:inline-block}
.mchip.B{color:#1A1303;background:linear-gradient(180deg,var(--goldsoft),var(--gold));border:1px solid #c79f3e}
.mchip.A{color:#06131F;background:linear-gradient(180deg,#86B7DC,#5E94C0);border:1px solid #4f86b6}
.pill{font-size:11px;padding:4px 11px;border-radius:999px;border:1px solid var(--line2);color:var(--muted);white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
.pill i{width:7px;height:7px;border-radius:50%}
.nfbadge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px}
.nfbadge.s{color:var(--imposto);background:rgba(226,86,75,.14);border:1px solid rgba(226,86,75,.3)}
.nfbadge.n{color:var(--faint);background:rgba(255,255,255,.04);border:1px solid var(--line2)}
.act{display:flex;gap:7px;justify-content:flex-end}
.ico{cursor:pointer;border:1px solid transparent;border-radius:8px;padding:7px 11px;font-size:12.5px;font-weight:600;transition:.16s;white-space:nowrap}
.ico.edit{color:var(--steel);background:rgba(107,160,204,.14);border-color:rgba(107,160,204,.3)}
.ico.edit:hover{background:rgba(107,160,204,.26);color:#d7e8f7}
.ico.del{color:var(--imposto);background:rgba(226,86,75,.12);border-color:rgba(226,86,75,.28)}
.ico.del:hover{background:rgba(226,86,75,.26);color:#ffdbd6}

/* ===== forms ===== */
.form{background:rgba(255,255,255,.02);border:1px solid var(--line2);border-radius:15px;padding:18px;margin-bottom:18px}
.formmeta{font-size:12px;color:var(--faint);margin:-4px 0 14px;font-family:"IBM Plex Mono",monospace;display:flex;flex-wrap:wrap;gap:6px 16px}
.fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
.fld label{font-size:12px;color:var(--muted);display:block;margin-bottom:6px;font-weight:500}
.fld input,.fld select{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--line2);border-radius:10px;padding:12px 13px;color:var(--text);font:inherit;font-size:14.5px;outline:none;transition:.18s;cursor:pointer}
.fld input:hover,.fld select:hover{border-color:var(--steel);background:rgba(107,160,204,.06)}
.fld input:focus,.fld select:focus{border-color:var(--gold);background:rgba(217,180,82,.06);box-shadow:0 0 0 3px rgba(217,180,82,.15)}
.fld select option,select option{background:#14202E;color:#F0F5FB}
select option:checked,option:checked{background:#15506f;color:#fff}
.fbtns{display:flex;gap:10px;margin-top:16px}
.cbx{position:relative}
.cbx .cbxq{cursor:text}
.cbxlist{display:none;position:absolute;left:0;right:0;top:calc(100% + 6px);z-index:60;max-height:288px;overflow-y:auto;background:var(--surface);border:1px solid var(--line2);border-radius:11px;box-shadow:0 18px 42px -12px rgba(0,0,0,.72);padding:5px}
.cbxitem{display:flex;flex-direction:column;gap:2px;padding:9px 11px;border-radius:8px;cursor:pointer}
.cbxitem b{font-size:13.5px;color:var(--text);font-family:"IBM Plex Mono",monospace;font-weight:600}
.cbxitem span{font-size:11.5px;color:var(--muted)}
.cbxitem:hover{background:rgba(46,128,235,.14)}
.cbxitem.on{background:rgba(217,180,82,.14)}
.cbxitem.on b{color:var(--goldsoft)}
.cbxempty,.cbxmore{padding:10px 11px;font-size:12px;color:var(--faint)}
.cbxmore{border-top:1px solid var(--line);margin-top:4px;color:var(--azuresoft)}
.params-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
.pcard{background:rgba(255,255,255,.022);border:1px solid var(--line2);border-radius:13px;padding:16px 17px;transition:.18s}
.pcard:hover{border-color:var(--steel);background:rgba(107,160,204,.05)}
.pcard .pl{display:flex;align-items:center;gap:9px;font-size:14px;color:var(--body);margin-bottom:12px;font-weight:500}
.pinput{position:relative;display:flex;align-items:center}
.pinput input{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--line2);border-radius:10px;padding:13px 38px 13px 14px;color:var(--text);font:inherit;font-family:"IBM Plex Mono",monospace;font-size:19px;font-weight:600;outline:none;transition:.18s}
.pinput input:hover{border-color:var(--steel)}
.pinput input:focus{border-color:var(--gold);background:rgba(217,180,82,.06);box-shadow:0 0 0 3px rgba(217,180,82,.16)}
.pinput .suffix{position:absolute;right:14px;color:var(--faint);font-size:14px;font-family:"IBM Plex Mono",monospace}
.pcard .pfoot{font-size:12.5px;color:var(--faint);margin-top:9px}

/* ===== notes ===== */
.note{border-radius:13px;padding:16px 18px;font-size:14px;line-height:1.65;border:1px solid var(--line2);background:rgba(255,255,255,.022);margin-bottom:16px;color:var(--body)}
.note.warn{border-color:rgba(238,128,51,.35);background:rgba(238,128,51,.07)}
.note.info{border-color:rgba(46,128,235,.34);background:rgba(46,128,235,.08)}
.note.ok{border-color:rgba(52,189,122,.32);background:rgba(52,189,122,.07)}
.note b{color:var(--text)}
.note .nh{display:flex;align-items:center;gap:9px;font-weight:700;margin-bottom:8px;font-family:"Fraunces",serif;font-size:15px;color:var(--text)}
.empty{color:var(--faint);font-size:14px;text-align:center;padding:34px}

/* ===== identidade clínica ===== */
.idrow{display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.idlogo{width:96px;height:96px;border-radius:16px;background:#fff;display:grid;place-items:center;overflow:hidden;border:1px solid var(--line2);flex:0 0 auto}
.idlogo img{width:100%;height:100%;object-fit:contain;padding:8px}
.idlogo.empty{background:linear-gradient(150deg,#16243a,#0c1320);color:var(--faint);font-size:12px;text-align:center;padding:8px}
.idfields{flex:1;min-width:240px;display:flex;flex-direction:column;gap:12px}
.filebtn{display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;font-weight:600;color:var(--steel);border:1px dashed var(--line2);border-radius:10px;padding:10px 14px;transition:.16s}
.filebtn:hover{border-color:var(--steel);background:rgba(107,160,204,.07)}
.filebtn input{display:none}

/* ===== auditoria ===== */
.audit{display:flex;flex-direction:column;gap:1px;border-radius:12px;overflow:hidden;border:1px solid var(--line)}
.arow{display:flex;align-items:center;gap:12px;padding:11px 15px;background:var(--surface);font-size:13px}
.arow .aw{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
.arow .ad{flex:1;color:var(--body)}.arow .ad b{color:var(--text)}
.arow .au{color:var(--faint);font-size:12px;font-family:"IBM Plex Mono",monospace;white-space:nowrap}
.arow .apap{font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:1px 7px;border-radius:5px;margin-right:3px;white-space:nowrap}
.arow .apap.adm{color:#1A1303;background:linear-gradient(180deg,var(--goldsoft),var(--gold))}
.arow .apap.op{color:var(--azuresoft);background:rgba(46,128,235,.16);border:1px solid rgba(46,128,235,.3)}
.arow .ae{display:block;color:var(--faint);font-size:11px;font-family:"IBM Plex Mono",monospace;margin-top:2px}

/* ===== instruções ===== */
.steps{counter-reset:s;display:flex;flex-direction:column;gap:18px}
.step{display:flex;gap:16px;align-items:flex-start}
.step .sn{counter-increment:s;flex:0 0 auto;width:32px;height:32px;border-radius:10px;background:linear-gradient(180deg,var(--goldsoft),var(--gold));color:#0A0F16;display:grid;place-items:center;font-weight:700;font-family:"IBM Plex Mono",monospace;font-size:15px}
.step .sn::before{content:counter(s)}
.step .sb{font-size:15px;line-height:1.62;color:var(--body);padding-top:3px}.step .sb b{color:var(--text);font-family:"Fraunces",serif;font-weight:600}
.matrix{font-size:13.5px}.matrix td,.matrix th{text-align:left;padding:11px 13px}
.kbd{font-family:"IBM Plex Mono",monospace;font-size:12.5px;background:rgba(255,255,255,.07);border:1px solid var(--line2);border-radius:6px;padding:3px 8px;color:var(--gold)}
.legend{display:flex;flex-wrap:wrap;gap:18px 26px;margin-top:4px}
.legend .lg{display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--body)}
.legend .lg i{width:13px;height:13px;border-radius:4px}

/* ===== modal (substitui confirm/alert/prompt) ===== */
.modal{position:fixed;inset:0;z-index:90;display:flex;align-items:center;justify-content:center;padding:22px;background:rgba(4,8,14,.74);backdrop-filter:blur(3px)}
.modalcard{width:100%;max-width:440px;background:linear-gradient(180deg,var(--surface),var(--ink2));border:1px solid var(--line2);border-radius:18px;padding:26px 26px 22px;box-shadow:0 34px 90px -34px rgba(0,0,0,.8)}
.modalcard h3{font-family:"Fraunces",serif;font-weight:600;font-size:18px;margin:0 0 9px;display:flex;align-items:center;gap:10px}
.modalcard p{color:var(--body);font-size:14.5px;margin:0 0 16px;line-height:1.6}
.modalcard input{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--line2);border-radius:10px;padding:12px 13px;color:var(--text);font:inherit;font-size:15px;outline:none;margin-bottom:16px;letter-spacing:.08em}
.modalcard input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(217,180,82,.16)}
.modalbtns{display:flex;gap:10px;justify-content:flex-end}
.modaldot{width:11px;height:11px;border-radius:3px;flex:0 0 auto}
/* ===== pizza em coluna (painel) ===== */
.piecol{display:flex;flex-direction:column;align-items:center;gap:20px}
.piecol .legrow{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%}
.legcard{background:rgba(255,255,255,.025);border:1px solid var(--line);border-radius:12px;padding:15px 17px}
.legcard .lc{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--muted);margin-bottom:8px}
.legcard .lc i{width:11px;height:11px;border-radius:3px;flex:0 0 auto}
.legcard .lv{font-family:"IBM Plex Mono",monospace;font-size:20px;font-weight:600;color:var(--text)}
.legcard .lp{font-size:12px;color:var(--faint);margin-top:2px}
@media(max-width:620px){.piecol .legrow{grid-template-columns:1fr}}
/* ===== brandmark (emblema) + logo fit ===== */
.brandmark{flex:0 0 auto;border-radius:10px;overflow:hidden;background:#0b1422;border:1px solid var(--line2)}
.brandmark img{width:100%;height:100%;object-fit:cover;display:block}
.clogo img.cover,.idlogo img.cover{object-fit:cover;padding:0}
.seg2{display:inline-flex;border:1px solid var(--line2);border-radius:9px;overflow:hidden}
.seg2 button{font:inherit;font-size:12.5px;font-weight:600;padding:8px 13px;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:.15s}
.seg2 button.on{background:rgba(63,182,232,.20);color:var(--text)}
.seg2 button:hover{color:var(--text)}
/* ===== footer premium (DignusMED — toda aba) ===== */
.foot{margin-top:40px;padding:24px clamp(18px,3vw,34px);border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,rgba(20,32,46,.55),rgba(10,16,25,.55));position:relative;overflow:hidden;display:grid;grid-template-columns:auto 1fr auto;gap:30px;align-items:center}
.foot::before{content:"";position:absolute;left:0;right:0;top:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--steel) 55%,transparent)}
.fbrand{display:flex;align-items:center;gap:14px}
.fbrand .fname{font-family:"Fraunces",serif;font-weight:600;font-size:20px;color:var(--text);letter-spacing:.01em;line-height:1}
.fbrand .ftag{font-size:11px;color:var(--azuresoft);letter-spacing:.18em;text-transform:uppercase;margin-top:6px}
.fmid{border-left:1px solid var(--line);border-right:1px solid var(--line);padding:6px 26px;text-align:center}
.fmid .fm1{font-family:"Fraunces",serif;font-size:14.5px;color:var(--body)}
.fmid .fm2{font-size:12px;color:var(--faint);margin-top:4px}
.fright{text-align:right;font-size:11.5px;color:var(--faint);line-height:1.7}
.fright b{color:var(--muted);font-weight:600;letter-spacing:.02em}
@media(max-width:860px){.foot{grid-template-columns:1fr;text-align:center;gap:16px;padding:22px}.fbrand{justify-content:center}.fmid{border:none;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:14px 0}.fright{text-align:center}}

@media(max-width:980px){.grid2,.grid2b{grid-template-columns:1fr}}
@media(max-width:600px){.kpis{grid-template-columns:repeat(2,1fr)}.headright{align-items:flex-start;width:100%}h1{font-size:23px}}
@media print{nav,.hbtns,.opright,.ico,.act,.rowbar .btn,.foot .fr,.filebtn{display:none!important}body{background:#fff;color:#000;font-size:12px}.card{break-inside:avoid;border-color:#ccc;background:#fff}header{background:#fff!important;border-color:#ccc!important}header::after,header::before{display:none!important}.oprow{background:#fff!important;border-color:#ccc!important}}
</style></head>

/* ============================ MOTOR (5 componentes) ============================ */
function cardFee(forma,H){var p=P();if(forma==="Cartão de débito")return H*p.deb;if(forma==="Cartão de crédito")return H*p.cred;return 0;}
function calcExec(e){
  var g=guiaByNo(e.guia)||{}, pf=profByCod(e.cod)||{modelo:"D"}, p=P();
  var modelo=pf.modelo||"D";
  var H=pnum(e.qtd)*pnum(g.vUnit);
  var particular=isPart(g.tipo);
  var card=cardFee(g.forma,H);
  var fat=particular?0:H*p.fat;
  var imposto=(g.nf==="Sim")?H*p.nfRate:0;
  var clin, rep;
  if(modelo==="M"){clin=H*p.modB.clin; rep=H-clin-card-fat-imposto;}
  else if(particular){rep=H*p.modA.prof-card; clin=H-rep-card-fat-imposto;}
  else{rep=H*p.modA.prof; clin=H-rep-card-fat-imposto;}
  return {H:H,card:card,fat:fat,imposto:imposto,desc:card+fat+imposto,clin:clin,rep:rep,
          modelo:modelo,part:particular,conv:(g.conv||"—"),nome:(pf.nome||e.cod),prof:pf.prof||"",nf:(g.nf==="Sim")};
}
function guiaCalc(g){
  var realizado=0,o={bruto:0,clin:0,rep:0,card:0,fat:0,imposto:0};
  DB.execs.forEach(function(e){if(e.guia===g.guia){var c=calcExec(e);realizado+=pnum(e.qtd);o.bruto+=c.H;o.clin+=c.clin;o.rep+=c.rep;o.card+=c.card;o.fat+=c.fat;o.imposto+=c.imposto;}});
  o.realizado=realizado;o.saldo=pnum(g.qtdAut)-realizado;return o;
}
function aggregate(){
  var tot={bruto:0,clin:0,card:0,fat:0,imposto:0,rep:0,sess:0};
  var byProf={},byConv={},stat={};
  STATUS_ORDER.forEach(function(s){stat[s]={v:0,n:0};});
  DB.execs.forEach(function(e){var c=calcExec(e);
    tot.bruto+=c.H;tot.clin+=c.clin;tot.card+=c.card;tot.fat+=c.fat;tot.imposto+=c.imposto;tot.rep+=c.rep;tot.sess+=pnum(e.qtd);
    var k=e.cod;byProf[k]=byProf[k]||{cod:k,nome:c.nome,modelo:c.modelo,sess:0,bruto:0,clin:0,rep:0,card:0,fat:0,imposto:0};
    byProf[k].sess+=pnum(e.qtd);byProf[k].bruto+=c.H;byProf[k].clin+=c.clin;byProf[k].rep+=c.rep;byProf[k].card+=c.card;byProf[k].fat+=c.fat;byProf[k].imposto+=c.imposto;});
  DB.guias.forEach(function(g){var gc=guiaCalc(g);var v=gc.bruto||(pnum(g.qtdAut)*pnum(g.vUnit));
    var cv=g.conv||"—";byConv[cv]=byConv[cv]||{nome:cv,n:0,v:0};byConv[cv].n++;byConv[cv].v+=v;
    var s=g.sit||"A faturar";if(!stat[s])stat[s]={v:0,n:0};stat[s].v+=v;stat[s].n++;});
  return {tot:tot,
    byProf:Object.values(byProf).filter(function(p){return p.sess>0;}).sort(function(a,b){return b.bruto-a.bruto;}),
    byConv:Object.values(byConv).filter(function(c){return c.v>0;}).sort(function(a,b){return b.v-a.v;}),
    stat:stat,guias:DB.guias.length};
}

function defaultPeriodo(){var ps={};DB.execs.forEach(function(e){if(e.periodo)ps[e.periodo]=1;});var k=Object.keys(ps).sort();return k.length?k[k.length-1]:"";}
/* ---- combobox de busca: campo Nº da guia (digitar OU clicar) ---- */
function cbxNorm(s){return (""+s).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");}
function guiaLabel(g){if(!g||!g.guia)return "";var p=g.pac?" · "+g.pac:"";var c=g.conv?" · "+g.conv:"";return g.guia+p+c;}
function cbxMatches(q){q=cbxNorm((q||"").trim());var out=[];for(var i=0;i<DB.guias.length;i++){var g=DB.guias[i];if(!g.guia)continue;var hay=cbxNorm(g.guia+" "+(g.pac||"")+" "+(g.conv||"")+" "+(g.proc||""));if(!q||hay.indexOf(q)>=0)out.push(g);}return out;}
function cbxRender(k,q){var box=document.getElementById("cbxlist_"+k);if(!box)return;var all=cbxMatches(q),cap=50,list=all.slice(0,cap),sel=(document.getElementById("f_"+k)||{}).value||"",html="";
  if(!DB.guias.length){html='<div class="cbxempty">Nenhuma guia cadastrada ainda — cadastre em <b>Guias</b> primeiro.</div>';}
  else if(!list.length){html='<div class="cbxempty">Nenhuma guia encontrada para a busca.</div>';}
  else{list.forEach(function(g){var idx=DB.guias.indexOf(g),on=g.guia===sel?' on':'';html+='<div class="cbxitem'+on+'" onmousedown="cbxPick(\''+k+'\','+idx+')"><b>'+esc(g.guia)+'</b><span>'+esc((g.pac||"—")+(g.conv?" · "+g.conv:""))+'</span></div>';});
    if(all.length>cap)html+='<div class="cbxmore">+ '+(all.length-cap)+' guias — refine a busca</div>';}
  box.innerHTML=html;box.style.display="block";}
function cbxOpen(k){var q=document.getElementById("cbxq_"+k);if(q){try{q.select();}catch(e){}}cbxRender(k,"");}
function cbxFilter(k,v){cbxRender(k,v);}
function cbxClose(k){var box=document.getElementById("cbxlist_"+k);if(box)box.style.display="none";}
function cbxBlur(k){setTimeout(function(){cbxResolve(k);cbxClose(k);},160);}
function cbxPick(k,idx){var g=DB.guias[idx],hid=document.getElementById("f_"+k),q=document.getElementById("cbxq_"+k);if(hid)hid.value=g?g.guia:"";if(q)q.value=guiaLabel(g);cbxClose(k);}
function cbxResolve(k){var q=document.getElementById("cbxq_"+k),hid=document.getElementById("f_"+k);if(!q||!hid)return;var txt=(q.value||"").trim();
  if(!txt){hid.value="";return;}
  var g=guiaByNo(txt);if(!g){var m=cbxMatches(txt);if(m.length===1)g=m[0];}
  if(g){hid.value=g.guia;q.value=guiaLabel(g);}
  else{var cur=hid.value?guiaByNo(hid.value):null;q.value=cur?guiaLabel(cur):"";if(!cur)hid.value="";}}
function cbxKey(e,k){if(e.key==="Escape"){cbxClose(k);return;}if(e.key==="Enter"){e.preventDefault();var m=cbxMatches((document.getElementById("cbxq_"+k)||{}).value||"");if(m.length)cbxPick(k,DB.guias.indexOf(m[0]));}}

/* ---- pizza (pie) ---- */
function pieSvg(segs,size){
  size=size||184;var r=size/2,cx=r,cy=r,tot=0;segs.forEach(function(s){tot+=Math.max(0,s.v);});if(tot<=0)tot=1;
  var ang=-Math.PI/2,paths="";
  segs.forEach(function(s){var frac=Math.max(0,s.v)/tot;if(frac<=0)return;var a2=ang+frac*2*Math.PI;
    if(frac>=0.9999){paths+='<circle cx="'+cx+'" cy="'+cy+'" r="'+(r-1)+'" fill="'+s.color+'"/>';ang=a2;return;}
    var x1=cx+(r-1)*Math.cos(ang),y1=cy+(r-1)*Math.sin(ang),x2=cx+(r-1)*Math.cos(a2),y2=cy+(r-1)*Math.sin(a2),large=frac>0.5?1:0;
    paths+='<path d="M'+cx+','+cy+' L'+x1.toFixed(2)+','+y1.toFixed(2)+' A'+(r-1)+','+(r-1)+' 0 '+large+',1 '+x2.toFixed(2)+','+y2.toFixed(2)+' Z" fill="'+s.color+'" stroke="#0A1019" stroke-width="1.2"/>';
    ang=a2;});
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+paths+'</svg>';
}
function legRow(label,colorvar,val,base){return '<div class="li"><div class="lf"><i style="background:'+colorvar+'"></i>'+label+'</div><div class="rt">'+brl.format(val)+'<small>'+pct(base>0?val/base:0)+'</small></div></div>';}
function stackHtml(segs,base){return '<div class="stack">'+segs.map(function(s){var w=base>0?Math.max(0,s.v)/base*100:0;return '<div class="seg" style="width:'+w+'%;background:'+s.color+'" title="'+s.label+' '+pct(base>0?s.v/base:0)+'">'+(w>9?s.label:"")+'</div>';}).join("")+'</div>';}

/* ============================ APURAÇÃO DE HONORÁRIOS ============================ */
function setApur(k,val){APUR[k]=val;render();}
function apurData(cod,from,to){
  var t={sess:0,bruto:0,clin:0,card:0,fat:0,imposto:0,rep:0,rows:[],byStatus:{},byLote:{}};
  STATUS_ORDER.forEach(function(s){t.byStatus[s]={n:0,bruto:0,rep:0};});
  DB.execs.forEach(function(e){
    if(e.cod!==cod)return;
    if(from&&to){var a=from,b2=to;if(a>b2){var tt=a;a=b2;b2=tt;}if(e.periodo<a||e.periodo>b2)return;}
    var c=calcExec(e),g=guiaByNo(e.guia)||{},sit=g.sit||"A faturar",lote=g.conv||"—";
    t.sess+=pnum(e.qtd);t.bruto+=c.H;t.clin+=c.clin;t.card+=c.card;t.fat+=c.fat;t.imposto+=c.imposto;t.rep+=c.rep;
    if(!t.byStatus[sit])t.byStatus[sit]={n:0,bruto:0,rep:0};
    t.byStatus[sit].n+=1;t.byStatus[sit].bruto+=c.H;t.byStatus[sit].rep+=c.rep;
    if(!t.byLote[lote])t.byLote[lote]={n:0,bruto:0,clin:0,card:0,fat:0,imposto:0,rep:0,tipo:g.tipo||""};
    var L=t.byLote[lote];L.n+=1;L.bruto+=c.H;L.clin+=c.clin;L.card+=c.card;L.fat+=c.fat;L.imposto+=c.imposto;L.rep+=c.rep;
    t.rows.push({guia:e.guia,periodo:e.periodo,conv:lote,sit:sit,qtd:pnum(e.qtd),H:c.H,clin:c.clin,card:c.card,fat:c.fat,imposto:c.imposto,rep:c.rep});
  });
  return t;
}

  var A=aggregate(),t=A.tot,b=t.bruto,carga=t.fat+t.card+t.imposto;
  var rec=(A.stat["Recebido"]||{v:0,n:0}), af=(A.stat["A faturar"]||{v:0,n:0});
  var v='<div class="kpis">'+
    kpi("Guias",A.guias,"cadastradas","var(--steel)")+
    kpi("Sessões",t.sess,"realizadas","var(--steel)")+
    kpi("A faturar",brl.format(af.v),af.n+" guia(s)","var(--gold)")+
    kpi("Recebido",brl.format(rec.v),rec.n+" guia(s)","var(--prof)")+
    '</div><div class="kpis">'+
    kpi("Faturamento bruto",brl.format(b),"100% do gerado","var(--steel)")+
    kpi("Honorário líq. clínica",brl.format(t.clin),pct(b>0?t.clin/b:0)+" do bruto","var(--clinica)")+
    kpi("Honorário líq. profissionais",brl.format(t.rep),pct(b>0?t.rep/b:0)+" do bruto","var(--prof)")+
    kpi("Carga (fat+taxas+imp)",brl.format(carga),pct(b>0?carga/b:0)+" do bruto","var(--imposto)")+
    '</div>';

  var segs=[{label:"Clínica",color:"var(--clinica)",v:t.clin},{label:"Faturista",color:"var(--fat)",v:t.fat},{label:"Taxas",color:"var(--taxa)",v:t.card},{label:"Impostos",color:"var(--imposto)",v:t.imposto},{label:"Repasse",color:"var(--prof)",v:t.rep}];
  v+='<div class="card"><h2><span class="dot" style="background:var(--gold)"></span>Divisão do faturamento <span class="sectlabel" style="font-weight:500;margin-left:4px">visão total</span></h2>'+
     '<p class="hint">Para onde vai cada real do faturamento bruto ('+brl.format(b)+').</p>'+stackHtml(segs,b)+
     '<div class="piewrap">'+pieSvg(segs)+'<div class="leg">'+legRow("Clínica","var(--clinica)",t.clin,b)+legRow("Faturista","var(--fat)",t.fat,b)+legRow("Taxas de cartão","var(--taxa)",t.card,b)+legRow("Impostos (NF)","var(--imposto)",t.imposto,b)+legRow("Repasse aos profissionais","var(--prof)",t.rep,b)+'</div></div></div>';

  /* clínica × profissional — pizza em cima, campos embaixo */
  var cp=[{label:"Clínica",color:"var(--clinica)",v:t.clin},{label:"Profissional",color:"var(--prof)",v:t.rep},{label:"Encargos",color:"var(--imposto)",v:carga}];
  function legCard(lab,colorvar,val){return '<div class="legcard"><div class="lc"><i style="background:'+colorvar+'"></i>'+lab+'</div><div class="lv">'+brl.format(val)+'</div><div class="lp">'+pct(b>0?val/b:0)+' do bruto</div></div>';}
  v+='<div class="card"><h2><span class="dot" style="background:var(--prof)"></span>Honorário líquido — Clínica × Profissional</h2>'+
     '<p class="hint">Resultado consolidado: o que fica com a clínica, o que vai aos profissionais e a carga (faturista + taxas + impostos).</p>'+
     '<div class="piecol">'+pieSvg(cp,210)+
       '<div class="legrow">'+legCard("Líquido da clínica","var(--clinica)",t.clin)+legCard("Líquido dos profissionais","var(--prof)",t.rep)+legCard("Encargos (fat + taxas + imp)","var(--imposto)",carga)+'</div>'+
     '</div></div>';

  /* status + por convênio */
  var smax=1;STATUS_ORDER.forEach(function(s){smax=Math.max(smax,(A.stat[s]||{v:0}).v);});
  v+='<div class="grid2b">';
  v+='<div class="card"><h2><span class="dot" style="background:var(--steel)"></span>Status dos recebíveis</h2><p class="hint">Da pré-fatura ao recebimento, incluindo recurso e decisão.</p><div class="funnel">';
  STATUS_ORDER.forEach(function(s){var o=A.stat[s]||{v:0,n:0},m=STATUS_META[s],w=o.v/smax*100;
    v+='<div class="frow"><div class="t"><div class="n"><i class="dot" style="background:'+m.c+'"></i>'+esc(s)+'</div><div class="a">'+brl.format(o.v)+'<span>'+o.n+' guia(s)</span></div></div><div class="trk"><div class="fil" style="width:'+w+'%;background:'+m.c+'"></div></div></div>';});

  v+='<div class="card"><h2><span class="dot" style="background:var(--clinica)"></span>Faturamento por convênio</h2><p class="hint">Volume bruto por fonte pagadora (inclui particular).</p><div class="bars">'+(convBars||'<div class="empty">Sem dados.</div>')+'</div></div>';
  v+='</div>';

  /* por profissional */
  v+='<div class="card"><h2><span class="dot" style="background:var(--prof)"></span>Análise por profissional</h2>'+
     '<p class="hint">Como o bruto de cada profissional se reparte. As três fatias — <span class="c-clin">Clínica</span> + <span class="c-imp">Encargos</span> + <span class="c-prof">Repasse</span> — somam 100%. Modelo <b>M</b> (médico): clínica fixa em '+pct(P().modB.clin,0)+', o médico assume os encargos. Modelo <b>D</b> (demais): profissional fica com '+pct(P().modA.prof,0)+', a clínica assume faturista e imposto.</p>'+

  A.byProf.forEach(function(p){var enc=p.card+p.fat+p.imposto;
    v+='<tr><td class="l">'+esc(p.nome)+'</td><td class="c">'+chip(p.modelo)+'</td><td class="mono">'+p.sess+'</td><td class="mono">'+brl.format(p.bruto)+'</td>'+
       '<td class="mono c-imp">'+brl.format(enc)+'<br><span style="color:var(--faint);font-size:11px">'+pct(p.bruto>0?enc/p.bruto:0)+'</span></td>'+
       '<td class="mono c-clin">'+brl.format(p.clin)+'<br><span style="color:var(--faint);font-size:11px">'+pct(p.bruto>0?p.clin/p.bruto:0)+'</span></td>'+
       '<td class="mono c-prof">'+brl.format(p.rep)+'<br><span style="color:var(--faint);font-size:11px">'+pct(p.bruto>0?p.rep/p.bruto:0)+'</span></td></tr>';});
  var tenc=t.card+t.fat+t.imposto;
  v+='<tr class="tot"><td class="l">TOTAL</td><td class="c"></td><td class="mono">'+t.sess+'</td><td class="mono">'+brl.format(b)+'</td><td class="mono c-imp">'+brl.format(tenc)+'<br><span style="font-size:11px">'+pct(b>0?tenc/b:0)+'</span></td><td class="mono c-clin">'+brl.format(t.clin)+'<br><span style="font-size:11px">'+pct(b>0?t.clin/b:0)+'</span></td><td class="mono c-prof">'+brl.format(t.rep)+'<br><span style="font-size:11px">'+pct(b>0?t.rep/b:0)+'</span></td></tr>';
  v+='</tbody></table></div></div>';

  /* registro de atividade */
  var aud=DB.audit||[];
  v+='<div class="card"><h2><span class="dot" style="background:var(--fat)"></span>Registro de atividade <span class="sectlabel" style="font-weight:500;margin-left:4px">auditoria por usuário</span></h2>'+
     '<p class="hint">Quem criou, editou ou excluiu cada registro — com identificação do usuário, data e hora. A DignusMED audita os lançamentos por esta trilha.</p>';
  if(aud.length){v+='<div class="audit">';
    aud.slice(0,20).forEach(function(a){var col=a.acao==="excluiu"?"var(--imposto)":(a.acao==="criou"?"var(--prof)":(a.acao==="restaurou"?"var(--gold)":"var(--steel)"));
      var pap=a.papel?'<span class="apap '+(a.papel==="admin"?"adm":"op")+'">'+(a.papel==="admin"?"DignusMED":"Operação")+'</span>':'';
      v+='<div class="arow"><i class="aw" style="background:'+col+'"></i><div class="ad"><b>'+esc(a.user)+'</b> '+pap+' '+esc(a.acao)+' '+esc(a.alvo)+(a.email?'<span class="ae">'+esc(a.email)+'</span>':'')+'</div><div class="au">'+fmtDateTime(a.ts)+'</div></div>';});
    v+='</div>';}
  else{v+='<div class="empty">Sem atividade registrada ainda. As ações aparecem aqui conforme você cadastra e edita.</div>';}
  v+='</div>';
  return v;
}

/* ============================ CSV ============================ */
function exportCSV(){
  var rows=[["Guia","Periodo","Cod","Profissional","Modelo","Convenio","Tipo","Situacao","NF","Qtd","Bruto","Clinica","Faturista","Taxas","Impostos","Repasse"]];
  DB.execs.forEach(function(e){var c=calcExec(e),g=guiaByNo(e.guia)||{};
    rows.push([e.guia,periodoLabel(e.periodo),e.cod,c.nome,c.modelo,g.conv||"",g.tipo||"",g.sit||"",g.nf||"Não",pnum(e.qtd),c.H,c.clin,c.fat,c.card,c.imposto,c.rep]);});
  var a=aggregate().tot;
  rows.push(["","","","TOTAL","","","","","",a.sess,a.bruto,a.clin,a.fat,a.card,a.imposto,a.rep]);
  var csv=rows.map(function(r){return r.map(function(x){if(typeof x==="number")return (Math.round(x*100)/100).toFixed(2).replace(".",",");x=""+x;return /[;"\n]/.test(x)?'"'+x.replace(/"/g,'""')+'"':x;}).join(";");}).join("\r\n");
  var blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8;"});var url=URL.createObjectURL(blob),link=document.createElement("a");
  link.href=url;link.download="faturamento_repasses_dignusmed.csv";document.body.appendChild(link);link.click();document.body.removeChild(link);URL.revokeObjectURL(url);
}
/* ============================ BACKUP / RESTORE JSON (v16) ============================ */
/* Serializa o ESTADO COMPLETO do DB (client, vendor, params, audit, profs, convs, guias,
   execs) e baixa como .json. O exportCSV continua existindo — este backup é a salvaguarda
   contra perda (dados ficam só neste navegador). */
function backupJSON(){
  try{
    var payload={
      _schema:"lev_fat_backup",
      _appVersion:APP_VERSION,
      _storageKey:KEY,
      _exportedAt:new Date().toISOString(),
      data:DB
    };
    var json=JSON.stringify(payload,null,2);
    var blob=new Blob([json],{type:"application/json;charset=utf-8;"});
    var url=URL.createObjectURL(blob),link=document.createElement("a");
    var t=new Date();var p=function(n){return (""+n).padStart(2,"0");};
    var stamp=t.getFullYear()+p(t.getMonth()+1)+p(t.getDate())+"_"+p(t.getHours())+p(t.getMinutes());
    link.href=url;link.download="backup_faturamento_lev_"+stamp+".json";
    document.body.appendChild(link);link.click();document.body.removeChild(link);URL.revokeObjectURL(url);
    logAudit("exportou","backup JSON do sistema");
    setHint("Backup JSON exportado · "+DB.guias.length+" guias · "+DB.execs.length+" execuções");
  }catch(e){uiAlert("Não foi possível gerar o backup JSON neste navegador.","Erro ao exportar backup");}
}
/* valida que o objeto tem a forma esperada (arrays/obj). Não altera dados. */
function isValidBackupShape(d){
  if(!d||typeof d!=="object")return false;
  if(!Array.isArray(d.profs))return false;
  if(!Array.isArray(d.convs))return false;
  if(!Array.isArray(d.guias))return false;
  if(!Array.isArray(d.execs))return false;
  if(!d.params||typeof d.params!=="object")return false;
  return true;
}
function triggerRestoreJSON(){
  var inp=document.getElementById("restoreFileInput");
  if(inp){inp.value="";inp.click();}
}
function onRestoreFile(input){
  var f=input.files&&input.files[0];
  if(!f){return;}
  var reader=new FileReader();
  reader.onerror=function(){uiAlert("Não foi possível ler o arquivo selecionado.","Erro ao importar backup");};
  reader.onload=function(){
    var parsed;
    try{parsed=JSON.parse(reader.result);}
    catch(e){uiAlert("O arquivo não é um JSON válido. Selecione um backup gerado por este sistema.","Arquivo inválido");return;}
    /* aceita tanto o envelope {_schema, data:{...}} quanto o DB puro {profs,...} */
    var incoming=(parsed&&parsed.data&&typeof parsed.data==="object")?parsed.data:parsed;
    if(!isValidBackupShape(incoming)){
      uiAlert("O arquivo não tem a estrutura esperada (faltam guias, execuções, profissionais, convênios ou parâmetros). Os dados atuais NÃO foram alterados.","Estrutura inválida");
      return;
    }
    var ng=(incoming.guias||[]).length, ne=(incoming.execs||[]).length;
    uiConfirm("Importar este backup vai SOBRESCREVER todos os dados atuais deste navegador por "+ng+" guias e "+ne+" execuções do arquivo. Esta ação não pode ser desfeita. Confirma?",
      function(){
        DB=incoming;
        /* normaliza campos opcionais ausentes sem tocar no motor de cálculo */
        if(!DB.client)DB.client={nome:"Minha Clínica",logo:""};
        if(!DB.vendor)DB.vendor={logo:DIGNUS_LOGO,h:"M",fit:"cover",posX:0,posY:0,zoom:100};
        if(!DB.audit)DB.audit=[];
        if(!DB.params)DB.params=JSON.parse(JSON.stringify(DEFAULT_PARAMS));
        logAudit("importou","backup JSON ("+ng+" guias · "+ne+" execuções)");
        save();SHOW={};EDIT={};render();
        uiAlert("Backup importado com sucesso: "+ng+" guias e "+ne+" execuções.","Importação concluída");
      },
      {danger:true,ok:"Importar e sobrescrever",title:"Importar backup JSON"});
  };
  reader.readAsText(f);
}
function printNow(){window.print();}

function doLogin(){
  var nome=(document.getElementById("lg_nome").value||"").trim();
  var email=(document.getElementById("lg_email").value||"").trim();
  var senha=(document.getElementById("lg_senha").value||"");
  var err=document.getElementById("lg_err");
  if(!nome||nome.length<2){err.textContent="Informe seu nome para identificação — cada ação fica registrada em seu nome.";return;}
  if(!email||!senha){err.textContent="Informe e-mail e senha.";return;}
  var acc=findAccount(email,senha);
  if(!acc){err.textContent="E-mail ou senha inválidos. Use as credenciais fornecidas pela DignusMED.";return;}
  USER={nome:nome,conta:acc.nome,email:acc.email,role:acc.role,ts:Date.now()};try{localStorage.setItem(UKEY,JSON.stringify(USER));}catch(e){}
  logAudit("entrou","sessão iniciada");save();boot();
}
function doLogout(){uiConfirm("Sair do sistema? Os dados continuam salvos neste dispositivo.",function(){logAudit("saiu","sessão encerrada");save();try{localStorage.removeItem(UKEY);}catch(e){}USER=null;boot();},{ok:"Sair",title:"Sair do sistema"});}
function initials(nome){var p=(nome||"").trim().split(/\s+/);if(p.length===1)return (p[0].slice(0,2)||"--").toUpperCase();return ((p[0]||" ")[0]+(p[p.length-1]||" ")[0]).toUpperCase();}

/* ============================ DISPATCHER ============================ */
function render(){
  renderHeader();
  document.getElementById("nav").innerHTML=TABS.map(function(tb){var on=tb[0]===TAB?' class="on"':'';var badge=tb[2]?'<span class="num">'+tb[2]+'</span>':'';return '<button'+on+' onclick="setTab(\''+tb[0]+'\')">'+badge+esc(tb[1])+'</button>';}).join("");
  var h;
  if(TAB==="instrucoes")h=renderInstrucoes();
  else if(TAB==="params")h=renderParams();
  else if(TAB==="apuracao")h=renderApuracao();
  else if(TAB==="painel")h=renderPainel();
  else h=renderEntity(TAB);
  document.getElementById("view").innerHTML=h;
  renderFooter();
}
function setOnline(s){ONLINE=s;if(USER)renderHeader();}
window.addEventListener("online",function(){setOnline(true);});
window.addEventListener("offline",function(){setOnline(false);});

function boot(){
  ONLINE=(typeof navigator!=="undefined"&&"onLine" in navigator)?navigator.onLine:true;
  var gate=document.getElementById("gate"), shell=document.getElementById("shell");
  if(!USER){gate.classList.remove("hide");shell.classList.add("hide");renderGate();}
  else{gate.classList.add("hide");shell.classList.remove("hide");render();save();}
}
boot();
